name: deliver

on:
  schedule:
    # UTC Fri 23:00 = JST Sat 08:00 (週 1 回)。
    # analyze workflow は 1h stagger で 3 chunk (weekend / mon-tue / wed-fri) を順に起動し、
    # 最遅 chunk (wed-fri) が UTC Fri 20:00 開始 / timeout 120min = UTC Fri 22:00
    # (JST Sat 07:00) に終わる。deliver はそこから 1h マージンを取って UTC Fri 23:00 開始。
    - cron: '0 23 * * 5'
  workflow_dispatch:

concurrency:
  group: deliver
  cancel-in-progress: false

permissions:
  contents: read
  issues: write     # 失敗時 Issue 起票

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - name: Run deliver
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: npm run deliver

      - name: Open issue on failure
        # cancelled() を含めるのは timeout-minutes 到達による中断を検知するため。
        # GitHub Actions の failure() は cancel をカバーしない仕様。
        if: failure() || cancelled()
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `[deliver] workflow failed (run ${context.runId})`;
            // 直近 24 時間に同種 Issue があればコメント追加で済ませる (Issue 乱立防止)
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'deliver-failure',
              since,
              per_page: 5,
            });
            const body = `workflow が失敗しました。\n\nrun: ${runUrl}\ntime: ${new Date().toISOString()}`;
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['deliver-failure'],
              });
            }
