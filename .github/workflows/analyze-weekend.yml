name: analyze-weekend

# 週次バッチ chunk 1/3: 先週の土日 (今 UTC から 7-5 日前) の raw_signals を分析。
# 同時起動する chunk 2 (analyze-mon-tue) / chunk 3 (analyze-wed-fri) と並列で
# Saturday 05:00 JST に発火する。
#
# 並列実行時の Anthropic TPM 注意:
#   3 chunks 同時起動だと drafter / scoring 合計で組織 TPM 8,000 tok/min を超える
#   局面が出る (実測前の机上見積りで peak 20-27k tok/min)。SDK の自動 backoff で
#   リトライ待機が長くなる前提で timeout-minutes を 120 に引き上げて完走させる。
#   それでも 2h で終わらないなら chunk ごとに数分 stagger するか SCORE_CONCURRENCY を
#   env で 1 に絞る対応に切り替える。
on:
  schedule:
    # UTC Fri 20:00 = JST Sat 05:00 (週 1 回)。
    - cron: '0 20 * * 5'
  workflow_dispatch:

concurrency:
  group: analyze-weekend
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - name: Run analyzer (last weekend)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # collected_at が [now-7d, now-5d) の範囲 = 先週土日に collect された signals
          ANALYZE_DAYS_AGO_START: '7'
          ANALYZE_DAYS_AGO_END: '5'
        run: npm run analyze

      - name: Open issue on failure
        if: failure() || cancelled()
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `[analyze-weekend] workflow failed (run ${context.runId})`;
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'analyze-failure',
              since,
              per_page: 5,
            });
            const body = `workflow が失敗しました。\n\nrun: ${runUrl}\ntime: ${new Date().toISOString()}`;
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['analyze-failure'],
              });
            }
