name: analyze-wed-fri

# 週次バッチ chunk 3/3: 水木金 (今 UTC から 3-0 日前) の raw_signals を分析。
# 同時起動する chunk 1 (analyze-weekend) / chunk 2 (analyze-mon-tue) と並列で
# Saturday 05:00 JST に発火する。
on:
  schedule:
    # UTC Fri 20:00 = JST Sat 05:00 (週 1 回)。
    - cron: '0 20 * * 5'
  workflow_dispatch:

concurrency:
  group: analyze-wed-fri
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - name: Run analyzer (Wed-Fri)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # collected_at が [now-3d, now) の範囲 = 水木金に collect された signals。
          # END=0 は「現在まで (上限なし)」を意味する。
          ANALYZE_DAYS_AGO_START: '3'
          ANALYZE_DAYS_AGO_END: '0'
        run: npm run analyze

      - name: Open issue on failure
        if: failure() || cancelled()
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `[analyze-wed-fri] workflow failed (run ${context.runId})`;
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'analyze-failure',
              since,
              per_page: 5,
            });
            const body = `workflow が失敗しました。\n\nrun: ${runUrl}\ntime: ${new Date().toISOString()}`;
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['analyze-failure'],
              });
            }
