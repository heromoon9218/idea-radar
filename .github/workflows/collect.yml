name: collect

on:
  schedule:
    # UTC 17 時 = JST 翌朝 2 時 (1 日 1 回)。
    # 週次 deliver (Sat 08:00 JST) の前日までに 7 日分のシグナルを集めるため
    # 朝の早い時間に固定。analyze は週次 (Sat 03:00 / 04:00 / 05:00 JST に 1h stagger
    # で 3 chunk 起動) で走るので、土曜分の collect (02:00) → 03:00 weekend chunk
    # 開始までに 1h のマージンを確保する。
    - cron: '0 17 * * *'
  workflow_dispatch:

concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - name: Run collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run collect

      - name: Open issue on failure
        # cancelled() を含めるのは timeout-minutes 到達による中断を検知するため。
        # GitHub Actions の failure() は cancel をカバーしない仕様。
        if: failure() || cancelled()
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `[collect] workflow failed (run ${context.runId})`;
            // 直近 24 時間に同種 Issue があればコメント追加で済ませる（Issue 乱立防止）
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'collect-failure',
              since,
              per_page: 5,
            });
            const body = `workflow が失敗しました。\n\nrun: ${runUrl}\ntime: ${new Date().toISOString()}`;
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['collect-failure'],
              });
            }
