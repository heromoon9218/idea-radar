name: analyze

on:
  schedule:
    # UTC 21:30 = JST 翌朝 06:30 (1 日 1 回)。
    # collect 完了 (UTC 21:10 目安) の 20 分後に開始する。
    # deliver は UTC 22:30 開始なので、timeout-minutes: 45 が満了 (UTC 22:15) しても
    # deliver までに 15min のマージンが残る (通常は 25-30min で完走するためより広い)。
    - cron: '30 21 * * *'
  workflow_dispatch:

concurrency:
  group: analyze
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Haiku が gap_candidates を 70+ 件出すスパイク日に Sonnet 起草 (DRAFT_CONCURRENCY=1
    # で 1 件 ~30s) が間に合うよう余裕を持たせる。2026-04-25 朝の配信欠落が 15min
    # timeout に到達した cancel が原因だったので 30min に引き上げ。
    # その後 SONNET_TOP_N 撤廃で全候補スコアリング (~30 件 × ~30s ≈ 15-18min) が drafter
    # phase (~14.5min) と直列で走るようになり、合計 ~30min ギリギリだったため 45min に再引き上げ。
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - name: Run analyzer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npm run analyze

      - name: Open issue on failure
        # cancelled() を含めるのは timeout-minutes 到達による中断を検知するため。
        # GitHub Actions の failure() は cancel をカバーしない仕様。
        if: failure() || cancelled()
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `[analyze] workflow failed (run ${context.runId})`;
            // 直近 24 時間に同種 Issue があればコメント追加で済ませる (Issue 乱立防止)
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'analyze-failure',
              since,
              per_page: 5,
            });
            const body = `workflow が失敗しました。\n\nrun: ${runUrl}\ntime: ${new Date().toISOString()}`;
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['analyze-failure'],
              });
            }
